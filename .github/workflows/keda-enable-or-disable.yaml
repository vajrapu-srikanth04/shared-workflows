name: "[Reusable] Toggle HPA / KEDA scaling"

on:
  workflow_call:
    inputs:
      mode:
        description: 'Enable or disable KEDA scaling'
        required: true
        type: string
      argocd_services:
        description: 'json array of argocd services to update'
        required: true
        type: string
      keda_files:
        description: 'json array of keda files to apply or delete'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        description: 'GitHub token with repo access'
        required: true

jobs:
  toggle-all-scaling:
    name: "Toggle HPA / KEDA scaling for all services"
    runs-on: ubuntu-latest
    steps:
      # ======================
      # Setup & Dependencies
      # ======================
      - name: "Install dependencies"
        run: |
          pip install ruamel.yaml jq
          sudo snap install yq
          export PATH="/snap/bin:$PATH"

      # ======================
      # Process ArgoCD Services (Sequential Loop)
      # ======================
      - name: "Process ArgoCD services"
        if: inputs.argocd_services != '[]'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MODE: ${{ inputs.mode }}
          ARGOCD_SERVICES: ${{ inputs.argocd_services }}
        run: |
          set -e
          export PATH="/snap/bin:$PATH"
          YQ="/snap/bin/yq"
          
          echo "🔄 Processing ${{ inputs.mode }} mode for ArgoCD services..."
          
          # Loop through each service using jq
          echo "$ARGOCD_SERVICES" | jq -c '.[]' | while read -r service; do
            echo ""
            echo "🔹 Processing service: $(echo "$service" | jq -r '.name')"
            
            REPO=$(echo "$service" | jq -r '.repo')
            APP_FOLDER=$(echo "$service" | jq -r '.application_folder_name')
            CHART_NAME=$(echo "$service" | jq -r '.chart_name')
            ENV_FILE=$(echo "$service" | jq -r '.env_file_name')
            
            # Checkout the repo
            REPO_DIR="argocd-${CHART_NAME}"
            if [ -d "$REPO_DIR" ]; then
              cd "$REPO_DIR" && git pull && cd ..
            else
              git clone --depth 1 \
                "https://${{github.actor}}:${GH_TOKEN}@github.com/${REPO}.git" \
                "$REPO_DIR"
            fi
            
            # Find the ArgoCD application file
            APP_FILE=$(find "$REPO_DIR/$APP_FOLDER" -type f -name "$ENV_FILE" 2>/dev/null | head -n 1)
            
            if [ -z "$APP_FILE" ] || [ ! -f "$APP_FILE" ]; then
              echo "⚠️ ArgoCD file not found: $ENV_FILE under $APP_FOLDER — skipping"
              continue
            fi
            
            echo "✅ Found: $APP_FILE"
            
            # Check if hpa.yaml exists in helm chart
            CHART_VERSION=$($YQ e '.spec.source.targetRevision' "$APP_FILE")
            CHART_PATH=$($YQ e '.spec.source.path' "$APP_FILE")
            HPA_FOUND="false"
            
            if [ "$CHART_VERSION" = "main" ] || [ "$CHART_VERSION" = "master" ] || [ "$CHART_VERSION" = "HEAD" ]; then
              HELM_DIR="helm-charts-${CHART_NAME}"
              if [ ! -d "$HELM_DIR" ]; then
                git clone --depth 1 \
                  "https://${{github.actor}}:${GH_TOKEN}@github.com/vajrapu-srikanth04/helm-charts.git" \
                  "$HELM_DIR" 2>/dev/null || true
              fi
              HPA_PATH="$HELM_DIR/${CHART_PATH}/templates/hpa.yaml"
            else
              echo "${GH_TOKEN}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null || true
              helm pull "oci://ghcr.io/vajrapu-srikanth04/${CHART_NAME}" \
                --version "$CHART_VERSION" --untar --destination /tmp 2>/dev/null || {
                echo "⚠️ Failed to pull chart — skipping HPA check"
                continue
              }
              HPA_PATH="/tmp/${CHART_NAME}/templates/hpa.yaml"
            fi
            
            if [ ! -f "$HPA_PATH" ]; then
              echo "⚠️ No HPA file at: $HPA_PATH — skipping"
              continue
            fi
            
            echo "✅ HPA file found — updating autoscaling parameter"
            
            # Toggle the parameter using your Python script
            AUTOSCALING_VALUE="${MODE == 'night' && 'false' || 'true'}"
            python3 pyscripts/utils/update-parameters.py add \
              "$REPO_DIR/$APP_FOLDER" \
              "$CHART_NAME" \
              "$ENV_FILE" \
              "autoscaling.enabled" \
              "$AUTOSCALING_VALUE"
            
            # Commit and push changes
            cd "$REPO_DIR"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            
            if git diff --cached --quiet; then
              echo "✅ No changes for $CHART_NAME"
            else
              COMMIT_MSG="chore($CHART_NAME): toggle autoscaling.enabled to $AUTOSCALING_VALUE [skip ci]"
              git remote set-url origin "https://${{github.actor}}:${GH_TOKEN}@github.com/${REPO}.git"
              
              for i in {1..10}; do
                if git commit -m "$COMMIT_MSG" && git push; then
                  echo "✅ Pushed changes for $CHART_NAME"
                  break
                fi
                echo "⚠️ Push attempt $i failed, retrying..."
                git pull --rebase
                sleep $((1 + RANDOM % 5))
              done
            fi
            cd ..
          done

      # ======================
      # Process KEDA Files (Sequential Loop)
      # ======================
      - name: "Process KEDA files"
        if: inputs.keda_files != '[]'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          MODE: ${{ inputs.mode }}
          KEDA_FILES: ${{ inputs.keda_files }}
        run: |
          set -e
          
          echo "🔄 Processing ${{ inputs.mode }} mode for KEDA files..."
          
          # Checkout stacks repo once
          git clone --depth 1 \
            "https://${{github.actor}}:${GH_TOKEN}@github.com/vajrapu-srikanth04/stacks.git" \
            keda-repo
          
          # Checkout shared workflows for Python scripts
          git clone --depth 1 \
            "https://${{github.actor}}:${GH_TOKEN}@github.com/vajrapu-srikanth04/shared-workflows.git" \
            pyscripts
          
          # Loop through each KEDA file using jq
          echo "$KEDA_FILES" | jq -c '.[]' | while read -r keda_file; do
            echo ""
            echo "🔹 Processing KEDA file: $(echo "$keda_file" | jq -r '.path')"
            
            FILE_PATH="keda-repo/$(echo "$keda_file" | jq -r '.path')"
            
            if [ ! -f "$FILE_PATH" ]; then
              echo "⚠️ KEDA file not found: $FILE_PATH — skipping"
              continue
            fi
            
            # Toggle the KEDA file using your Python script
            python3 pyscripts/utils/toggle-keda.py "$FILE_PATH" "$MODE"
            
            # Show result for debugging
            COMMENTED=$(grep -c "^#" "$FILE_PATH" 2>/dev/null || echo 0)
            TOTAL=$(wc -l < "$FILE_PATH" 2>/dev/null || echo 0)
            echo "📊 Result: $COMMENTED/$TOTAL lines commented"
          done
          
          # Commit and push ALL KEDA changes at once
          cd keda-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          
          if git diff --cached --quiet; then
            echo "✅ No KEDA changes to commit"
          else
            COMMIT_MSG="chore: toggle KEDA scaling to ${{ inputs.mode }} mode [skip ci]"
            git remote set-url origin "https://${{github.actor}}:${GH_TOKEN}@github.com/vajrapu-srikanth04/stacks.git"
            
            for i in {1..10}; do
              if git commit -m "$COMMIT_MSG" && git push; then
                echo "✅ Pushed KEDA changes"
                break
              fi
              echo "⚠️ Push attempt $i failed, retrying..."
              git pull --rebase
              sleep $((1 + RANDOM % 5))
            done
          fi
