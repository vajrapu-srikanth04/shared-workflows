name: "[Reusable] Toggle HPA / KEDA scaling"

on:
  workflow_call:
    inputs:
      mode:
        description: '"night" → enable KEDA + disable HPA | "morning" → disable KEDA + enable HPA'
        required: true
        type: string
      argocd_services:
        description: 'JSON array of ArgoCD service manifest configs'
        required: true
        type: string
      keda_files:
        description: 'JSON array of KEDA file configs'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        description: 'GitHub PAT with write access to target repos'
        required: true

# -----------------------------------------------------------------------------
# Job 1 - Patch autosaling.enabled in each ArgoCD Helm manifest
# -----------------------------------------------------------------------------

jobs:
  toggle-argocd-hpa:
    name: "HPA [${{ matrix.service.name }}] → autoscaling.enabled = ${{ inputs.mode == 'night' && 'false' || 'true' }}"
    runs-on: ubuntu-latest
      # group: linux
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     service: ${{ fromJson(inputs.argocd_services) }}
    
    steps:
      - name: "Checkout ArgoCD manifest repo"
        uses: actions/checkout@v5
        with:
          repository: vajrapu-srikanth04/argocd-manifests
          token: ${{ secrets.GH_TOKEN }}
          path: argocd-manifests

      - name: "checkout shared workflows (Python scripts)"
        uses: actions/checkout@v5
        with:
          repository: vajrapu-srikanth04/shared-workflows
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: py-scripts

      - name: "Install dependencies"
        run: |
          pip install ruamel.yaml
          mkdir -p "$HOME/.local/bin"
          wget -qO "$HOME/.local/bin/yq" \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x "$HOME/.local/bin/yq"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          "$HOME/.local/bin/yq" --version # confirm v4.x.x
      
      - name: Install Helm
        uses: azure/setup-helm@v4.1.0
        with:
          version: 4.1.0

      - name: Patch autoscaling.enabled for all services
        env:
          ARGOCD_SERVICES: ${{ inputs.argocd_services }}
          MODE: ${{ inputs.mode }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_ACTOR: ${{ github.actor }}
        run: |
          AUTOSCALING_VALUE="true"
          [ "$MODE" == "night" ] && AUTOSCALING_VALUE="false"

          echo "▶ Mode                 : $MODE"
          echo "▶ autoscaling.enabled  : $AUTOSCALING_VALUE"
          echo "▶ Services             : $(echo $ARGOCD_SERVICES | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))")"

          # -- Iterate every service using jq -----------------
          echo "$ARGOCD_SERVICES" | jq -c '.[]' | while IFS= read -r service; do

            NAME=$(echo "$service"        | jq -r '.name')
            APP_FOLDER=$(echo "$service"  | jq -r '.application_folder_name')
            CHART_NAME=$(echo "$service"  | jq -r '.chart_name')
            ENV_FILE=$(echo "$service"    | jq -r '.env_file_name')

            echo ""
            echo "----------------------------------------------"
            echo "| Service    : $NAME"
            echo "| App Folder : $APP_FOLDER"
            echo "| Chart      : $CHART_NAME"
            echo "| Env File   : $ENV_FILE"
            echo "----------------------------------------------"

            # -- Locate the ArgoCD manifest file -----------------
            ENV_FILE_PATH=$(find \
              "argocd-manifests/$APP_FOLDER/$CHART_NAME" \
              -type f -name "$ENV_FILE" | head -n 1)

            if [ -z "$ENV_FILE_PATH" ]; then
              echo "❌ Could not find $ENV_FILE under $APP_FOLDER/$CHART_NAME - skipping"
              continue
            fi
            echo "▶ Found manifest: $ENV_FILE_PATH"

            # -- Read targetReevision ---------------------------------
            CHART_VERSION=$(yq e '.spec.source.targetRevision' "$ENV_FILE_PATH")
            echo "▶ targetRevision: $CHART_VERSION"

            HPA_FOUND="false"

            if [ "$CHART_VERSION" = "HEAD" ]; then
              # -- HEAD: clone sparq-helm-charts -----------------------
              if [ ! -d "helm-charts" ]; then
                echo "▶ Cloning sparq-helm-charts..."
                git clone \
                  "https://${GH_ACTOR}:${GH_TOKEN}@github.com/vajrapu-srikanth04/sparq-helm-charts.git" \
                  helm-charts
              fi
              HPA_PATH="helm-charts/charts/$CHART_NAME/templates/hpa.yaml"
            
            else
              # -- Versioned: pull chart from GHCR ----------------------
              if [ ! -d "$CHART_NAME" ]; then
                echo "▶ Pulling helm chart version $CHART_NAME..."
                echo "$GH_TOKEN" | helm registry login ghcr.io \
                  -u "$GH_ACTOR" --password-stdin
                helm pull "oci://ghcr.io/vajrapu-srikanth04/"$CHART_NAME" \
                  --version "$CHART_VERSION" --untar
              fi
              HPA_PATH="$CHART_NAME/templates/hpa.yaml"
            fi

            # -- Check hpa.yaml --------------------------------
            if [ -f "$HPA_PATH" ]; then
              echo "✅ hpa.yaml found - patching autoscaling.enabled=$AUTOSCALING_VALUE"
              HPA_FOUND="true"
            else
              echo "⚠️ hpa.yaml NOT found at $HPA_PATH - skipping $NAME"
            fi

            # -- Patch if hpa.yaml exists -------------------------------
            if [ "$HPA_FOUND" = "true" ]; then
              if [ "$MODE" == "night" ]; then
                echo "▶ NIGHT → overriding autoscaling.enabled=false"
                python3 py-scripts/utils/update-parameters.py \
                  add \
                  "${{ github.workspace }}/argocd-manifests/$APP_FOLDER" \
                  "$CHART_NAME" \
                  "$ENV_FILE" \
                  "autoscaling.enabled" \
                  "false"
                echo "✅ autoscaling.enabled=false set for $NAME"

              else
                echo "▶ MORNING → removing autoscaling.enabled override"
                python3 py-scripts/utils/update-parameters.py \
                  delete \
                  "${{ github.workspace }}/argocd-manifests/$APP_FOLDER" \
                  "$CHART_NAME" \
                  "$ENV_FILE" \
                  "autoscaling.enabled"
                echo "✅ autoscaling.enabled override removed for $NAME"
              fi
            fi

          done

      - name: Commit and push changes
        run: |
          cd "${{ github.workspace }}/argocd-manifests"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No changes across all services"
            exit 0
          fi

          echo "▶ Files changed:"
          git diff --cached --name-only

          # -- Stash → pull → restore ------------------------------
          echo "▶ Stashing staged changes..."
          git stash

          echo "▶ Pulling latest changes before commit..."
          if ! git pull --rebase; then
            echo "❌ pull failed - restoring stash and exiting"
            git stash pop
            exit 1
          fi
          echo "✅ Pull successful"

          echo "▶ Restoring stashed changes..."
          git stash pop
          git add -A

          # -- Commit ONCE outside loop -------------------------------
          git commit -m "chore(scaling): autoscaling.enabled=${{ inputs.mode == 'night' && 'false' || 'true' }} for all services [scheduler/${{ inputs.mode }}]"

          # -- Retry ONLY the push -------------------------
          GIT_RETRY=0
          MAX_RETRIES=10

          until [ "$GIT_RETRY" -lt "$MAX_RETRIES" ]; do
            echo "▶ Attempting push (try $((GIT_RETRY+1))/$MAX_RETRIES)..."
            
            if git push; then
              echo "✅ Push successful"
              exit 0
            fi

            GIT_RETRY=$((GIT_RETRY+1))
            WAIT=$((1 + RANDOM % 10))
            echo "❌ Push failed, retry $GIT_RETRY in ${WAIT} seconds"
            sleep $WAIT

            if ! git pull --rebase; then
              echo "❌ Rebase failed manual intervention needed"
              exit 1
            fi
            echo "▶ Rebase successful, retrying push..."
          done

          echo "❌ Push failed after $MAX_RETRIES retries"
          exit 1

# -----------------------------------------------------------------------------
# Job 2 - Comment / uncomment entire KEDA manifest files
# -----------------------------------------------------------------------------
  toggle-keda:
    name: "KEDA [${{ matrix.keda_file.path }}] → ${{ inputs.mode == 'night' && 'ENABLE' || 'DISABLE' }}"
    runs-on: ubuntu-latest
    # strategy:
    #   fail-fast: false
    #   matrix:
    #     keda_file: ${{ fromJson(inputs.keda_files) }}

    steps:
      - name: Checkout KEDA manifest repo
        uses: actions/checkout@v5
        with:
          repository: vajrapu-srikanth04/stacks
          token: ${{ secrets.GH_TOKEN }}
          path: keda-repo
      
      - name: checkout shared workflows (Python scripts)
        uses: actions/checkout@v5
        with:
          repository: vajrapu-srikanth04/shared-workflows
          ref: main
          token: ${{ secrets.GH_TOKEN }}
          path: py-scripts

      - name: Toggle all KEDA manifests
        env:
          MODE: ${{ inputs.mode }}
          KEDA_FILES: ${{ inputs.keda_files }}
        run: |
          echo "▶ Mode       : $MODE"
          echo "▶ KEDA files : $(echo $KEDA_FILES | python3 -c "import sys,json; data=json.load(sys.stdin); print(len(data))")"
          echo "---------------------------------------"

          echo "$KEDA_FILES" | jq -c '.[]' | while IFS= read -r keda_file; do

            KEDA_PATH=$(echo "$keda_file" | jq -r '.path')

            echo ""
            echo "---------------------------------------"
            echo "| File : $KEDA_PATH"
            echo "| Mode : $MODE"
            echo "---------------------------------------"

            export FILE_PATH="keda-repo/$KEDA_PATH"
            export MODE="$MODE"

            python3 py-scripts/utils/toggle-keda.py
            echo "✅ Done: $KEDA_PATH"

          done

      - name: Commit and push all KEDA changes
        working-directory: keda-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes across all KEDA files"
            exit 0
          fi
          echo "▶ Files changed:"
          git diff --cached --name-only
          
          GIT_RETRY=0
          until [ "$GIT_RETRY" -ge 10 ]; do
            git commit -m "chore(keda): ${{ inputs.mode == 'night' && 'enable' || 'disable' }} all KEDA manifests [scheduler/${{ inputs.mode }}]" && \
            git push && break
            GIT_RETRY=$((GIT_RETRY+1))
            WAIT=$((1 + RANDOM % 10))
            echo "❌ Push failed, retry $GIT_RETRY in ${WAIT} seconds"
            sleep $WAIT
            git pull --rebase
            echo "▶ Retry count: $GIT_RETRY"
          done
