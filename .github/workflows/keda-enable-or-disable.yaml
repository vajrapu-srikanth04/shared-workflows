name: "[Reusable] Toggle HPA / KEDA scaling"

on:
  workflow_call:
    inputs:
      mode:
        description: 'Enable or disable KEDA scaling'
        required: true
        type: string
      argocd_services:
        description: 'json array of argocd services to update'
        required: true
        type: string
      keda_files:
        description: 'json array of keda files to apply or delete'
        required: true
        type: string
    secrets:
      GH_TOKEN:
        description: 'GitHub token with repo access'
        required: true

jobs:
  toggle-argocd-hpa:
    name: "Toggle HPA / KEDA scaling for ArgoCD services"
    runs-on: ubuntu-latest
    if: inputs.argocd_services != '[]'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(inputs.argocd_services) }}
    
    steps:
      - name: "Checkout ArgoCD manifests repo"
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.service.repo }}
          path: argocd-manifests
          token: ${{ secrets.GH_TOKEN }}

      - name: "Checkout shared workflows"
        uses: actions/checkout@v4
        with:
          repository: vajrapu-srikanth04/shared-workflows
          path: pyscripts
          token: ${{ secrets.GH_TOKEN }}

      - name: "Install dependencies"
        run: |
          pip install ruamel.yaml
          sudo snap install yq

      - name: "Check if hpa.yaml exists in helm chart"
        id: hpa_check
        run: |
          set -e
          APP_FILE="argocd-manifests/${{ matrix.service.application_folder_name }}/${{ matrix.service.env_file_name }}"
          
          if [ ! -f "$APP_FILE" ]; then
            echo "❌ ArgoCD file not found: $APP_FILE"
            exit 1
          fi
          
          CHART_VERSION=$(yq e '.spec.source.targetRevision' "$APP_FILE")
          CHART_PATH=$(yq e '.spec.source.path' "$APP_FILE")
          echo "🎯 targetRevision: $CHART_VERSION, path: $CHART_PATH"
          
          HPA_FOUND="false"
          
          if [ "$CHART_VERSION" = "main" ] || [ "$CHART_VERSION" = "master" ] || [ "$CHART_VERSION" = "HEAD" ]; then
            git clone --depth 1 \
              "https://${{github.actor}}:${{ secrets.GH_TOKEN }}@github.com/vajrapu-srikanth04/helm-charts.git" \
              helm-charts 2>/dev/null || true
            HPA_PATH="helm-charts/${CHART_PATH}/templates/hpa.yaml"
          else
            echo "${{ secrets.GH_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin 2>/dev/null || true
            helm pull "oci://ghcr.io/vajrapu-srikanth04/${{ matrix.service.chart_name }}" \
              --version "$CHART_VERSION" --untar --destination /tmp 2>/dev/null || {
              echo "⚠️ Failed to pull chart, skipping HPA check"
              echo "hpa_found=false" >> $GITHUB_OUTPUT
              exit 0
            }
            HPA_PATH="/tmp/${{ matrix.service.chart_name }}/templates/hpa.yaml"
          fi
          
          if [ -f "$HPA_PATH" ]; then
            echo "✅ HPA file found: $HPA_PATH"
            HPA_FOUND="true"
          else
            echo "⚠️ No HPA file at: $HPA_PATH"
          fi
          echo "hpa_found=$HPA_FOUND" >> $GITHUB_OUTPUT

      - name: "Toggle autoscaling parameter"
        if: steps.hpa_check.outputs.hpa_found == 'true'
        run: |
          AUTOSCALING_VALUE="${{ inputs.mode == 'night' && 'false' || 'true' }}"
          echo "🔄 Setting autoscaling.enabled=$AUTOSCALING_VALUE"
          
          python3 pyscripts/update-parameters.py \
            add \
            "${{ github.workspace }}/argocd-manifests/${{ matrix.service.application_folder_name }}" \
            "${{ matrix.service.chart_name }}" \
            "${{ matrix.service.env_file_name }}" \
            "autoscaling.enabled" \
            "$AUTOSCALING_VALUE"

      - name: "Commit and push ArgoCD changes"
        if: steps.hpa_check.outputs.hpa_found == 'true'
        run: |
          cd "${{ github.workspace }}/argocd-manifests"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --cached --quiet; then
            echo "✅ No ArgoCD changes to commit"
            exit 0
          fi
          
          AUTOSCALING_VALUE="${{ inputs.mode == 'night' && 'false' || 'true' }}"
          COMMIT_MSG="chore(${{ matrix.service.name }}): toggle autoscaling.enabled to $AUTOSCALING_VALUE [skip ci]"
          
          # Configure auth for push
          git remote set-url origin "https://${{github.actor}}:${{ secrets.GH_TOKEN }}@github.com/${{ matrix.service.repo }}.git"
          
          GIT_RETRY=0
          until [ "$GIT_RETRY" -ge 10 ]; do
            if git commit -m "$COMMIT_MSG" && git push; then
              echo "✅ Pushed ArgoCD changes"
              break
            fi
            GIT_RETRY=$((GIT_RETRY + 1))
            sleep $((1 + RANDOM % 5))
            git pull --rebase
          done

  toggle-keda:
    name: "Apply or delete KEDA files for scaling"
    runs-on: ubuntu-latest
    if: inputs.keda_files != '[]'
    strategy:
      fail-fast: false
      matrix:
        keda_file: ${{ fromJson(inputs.keda_files) }}
    
    steps:
      - name: "Checkout stacks repo (KEDA manifests)"
        uses: actions/checkout@v4
        with:
          repository: vajrapu-srikanth04/stacks
          path: keda-repo
          token: ${{ secrets.GH_TOKEN }}
      
      - name: "Checkout shared workflows"
        uses: actions/checkout@v4
        with:
          repository: vajrapu-srikanth04/shared-workflows
          path: pyscripts
          token: ${{ secrets.GH_TOKEN }}

      - name: "Debug: Show KEDA file before toggle"
        run: |
          FILE_PATH="keda-repo/${{ matrix.keda_file.path }}"
          echo "🔍 File: $FILE_PATH"
          echo "📋 First 20 lines before toggle:"
          head -20 "$FILE_PATH" || echo "⚠️ File not found!"
          echo "---"
          # Count commented vs uncommented lines
          TOTAL=$(wc -l < "$FILE_PATH" 2>/dev/null || echo 0)
          COMMENTED=$(grep -c "^#" "$FILE_PATH" 2>/dev/null || echo 0)
          echo "📊 Lines: $TOTAL total, $COMMENTED commented"

      - name: "Toggle KEDA file"
        env:
          FILE_PATH: "keda-repo/${{ matrix.keda_file.path }}"
          MODE: "${{ inputs.mode }}"
        run: |
          echo "🔄 Mode: $MODE (night=enable KEDA, morning=disable KEDA)"
          python3 pyscripts/utils/toggle_keda.py "$FILE_PATH" "$MODE"
          
          # Show result
          echo "📋 First 20 lines after toggle:"
          head -20 "$FILE_PATH"
          TOTAL=$(wc -l < "$FILE_PATH")
          COMMENTED=$(grep -c "^#" "$FILE_PATH" || echo 0)
          echo "📊 Lines: $TOTAL total, $COMMENTED commented"

      - name: "Commit and push KEDA changes"
        run: |
          cd "keda-repo"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          
          if git diff --cached --quiet; then
            echo "✅ No KEDA changes to commit (file may already be in target state)"
            exit 0
          fi
          
          COMMIT_MSG="chore: toggle KEDA scaling to ${{ inputs.mode }} mode [skip ci]"
          
          # Configure auth for push
          git remote set-url origin "https://${{github.actor}}:${{ secrets.GH_TOKEN }}@github.com/vajrapu-srikanth04/stacks.git"
          
          GIT_RETRY=0
          until [ "$GIT_RETRY" -ge 10 ]; do
            if git commit -m "$COMMIT_MSG" && git push; then
              echo "✅ Pushed KEDA changes"
              break
            fi
            GIT_RETRY=$((GIT_RETRY + 1))
            sleep $((1 + RANDOM % 5))
            git pull --rebase
          done
